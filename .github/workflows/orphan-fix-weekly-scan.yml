# Weekly scan for [fix] commits on non-main branches.
#
# Files a GitHub issue (or comments on the existing one) when any
# branch has fix commits that haven't reached main. Prevents the
# "fixed it once but it's back" regression.
#
# Portable: drop into any repo's .github/workflows/. Works with
# GITHUB_TOKEN default permissions (no PAT required).
#
# Reference: docs/BRANCH_WORKFLOW.md

name: Orphan [fix] Scanner

on:
  schedule:
    # Every Monday 09:00 UTC
    - cron: '0 9 * * 1'
  # Manual trigger for ad-hoc runs
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all branches
        run: git fetch --all --prune

      - name: Run scanner
        id: scan
        continue-on-error: true
        run: |
          chmod +x tools/scan-orphan-fixes.sh
          export MAIN_BRANCH=master
          set +e
          tools/scan-orphan-fixes.sh --remote --json > /tmp/scan.json
          EXIT=$?
          set -e
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          {
            echo 'report<<EOF'
            tools/scan-orphan-fixes.sh --remote || true
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Open / update tracking issue
        if: steps.scan.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const scanOutput = `${{ steps.scan.outputs.report }}`;
            const fs = require('fs');
            const json = JSON.parse(fs.readFileSync('/tmp/scan.json', 'utf8'));

            const title = `🔴 Orphan [fix] commits detected (${json.total})`;
            const body = [
              '## Weekly orphan-fix scan',
              '',
              `**Total orphan commits**: ${json.total}`,
              `**Base branch**: \`${json.base}\``,
              '',
              '### Branches with orphan fixes',
              '',
              ...json.branches.map(b =>
                `#### \`${b.branch}\` — ${b.count} commits\n` +
                b.commits.map(c => `- \`${c.sha}\` ${c.subject}`).join('\n')
              ),
              '',
              '### Action required',
              '',
              'These branches contain `[fix]` commits not in main. Follow',
              '`docs/BRANCH_WORKFLOW.md` §4 to backport (cherry-pick or PR).',
              '',
              '```bash',
              '# Example: cherry-pick all fixes from a branch',
              'git checkout main',
              'git cherry-pick <SHA1> <SHA2> ...',
              'git push origin main',
              '```',
              '',
              `<sub>Auto-generated by \`.github/workflows/orphan-fix-weekly-scan.yml\` on ${new Date().toISOString()}</sub>`,
            ].join('\n');

            // Find existing open issue with the tracking label
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'orphan-fix',
            });

            if (existing.data.length > 0) {
              // Update the first matching issue
              const issue = existing.data[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title,
                body,
              });
              core.info(`Updated issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['orphan-fix'],
              });
              core.info(`Created issue #${created.data.number}`);
            }

      - name: Close tracking issue when clean
        if: steps.scan.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'orphan-fix',
            });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '✅ All orphan fix commits have been backported. Closing.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
